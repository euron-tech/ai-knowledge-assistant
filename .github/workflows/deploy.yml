# ============================================================
# Session 5: CI/CD Pipeline
# ============================================================
# Flow: Push code to GitHub -> Auto build Docker -> Push to ECR -> Deploy to ECS
#
# This runs automatically every time you push to the 'main' branch.
# ============================================================

name: Deploy to AWS ECS

on:
  push:
    branches: [main, master]       # Deploy when code is pushed to main/master
  pull_request:
    branches: [main, master]       # Run tests on pull requests (but don't deploy)

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: ai-assistant
  ECS_CLUSTER: ai-assistant-cluster
  ECS_SERVICE: ai-assistant-service

jobs:

  # ---- JOB 1: Run Tests ----
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run basic tests
        run: |
          cd app
          python -c "from main import app; print('App imports OK')"
          python -c "from rag import router; print('RAG imports OK')"
          echo "All tests passed!"

  # ---- JOB 2: Build & Deploy (only on main branch) ----
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test           # Only deploy if tests pass
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Login to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 2: Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 3: Build Docker image
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # Step 4: Deploy to ECS (force new deployment)
      - name: Deploy to ECS
        run: |
          echo "Deploying to ECS..."
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

          echo "Deployment triggered! ECS will rolling-update containers."

      # Step 5: Wait for deployment to stabilize
      - name: Wait for deployment
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "Deployment complete!"
